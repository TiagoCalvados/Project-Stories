<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="shared.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #08080a;
    }

    .enter-button-tiago-overview {
      top: max(24px, env(safe-area-inset-top));
      right: max(24px, env(safe-area-inset-right));
      bottom: auto;
      left: auto;
      transform: none;
    }

    .enter-button-tiago-overview:hover,
    .enter-button-tiago-overview:focus-visible {
      transform: translateY(-2px);
    }

    .enter-button-tiago-overview:active {
      transform: none;
    }

    @media (max-width: 700px) {
      .enter-button-tiago-overview {
        top: max(16px, env(safe-area-inset-top));
        right: max(16px, env(safe-area-inset-right));
      }
    }

  </style>
</head>
<body>
  <main class="story-stage">
    <div class="story-frame">
      <img class="story-stage-image" src="Tiago/diagrams/tiagooverview.png" alt="">
      <a class="enter-button enter-button-tiago-overview" href="tiagooverview2.html" aria-label="Enter Tiago overview 2">Enter</a>
    </div>
  </main>
</body>
</html>
