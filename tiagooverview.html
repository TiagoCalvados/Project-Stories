<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="shared.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #08080a;
    }

    .enter-button-tiago-overview {
      position: absolute;
      top: 9.5%;
      right: 5.2%;
      bottom: auto;
      left: auto;
      min-width: 86px;
      min-height: 32px;
      padding: 0 16px;
      font-size: 11px;
      letter-spacing: 0.06em;
      transform: none;
    }

    .enter-button-tiago-overview:hover,
    .enter-button-tiago-overview:focus-visible {
      transform: translateY(-2px);
    }

    .enter-button-tiago-overview:active {
      transform: none;
    }

    @media (max-width: 700px) {
      .enter-button-tiago-overview {
        top: 9.5%;
        right: 4.6%;
        min-width: 66px;
        min-height: 24px;
        padding: 0 10px;
        font-size: 8px;
        letter-spacing: 0.04em;
      }
    }

  </style>
</head>
<body>
  <main class="story-stage">
    <div class="story-frame">
      <img class="story-stage-image" src="Tiago/diagrams/tiagooverview.png" alt="">
      <a class="enter-button enter-button-tiago-overview" href="tiagooverview2.html" aria-label="Enter Tiago overview 2">Enter</a>
    </div>
  </main>
</body>
</html>
