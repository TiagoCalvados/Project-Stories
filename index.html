<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Stories - Tiago K</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111114;
      color: #f4f0e8;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: grid;
      align-items: end;
      padding: 40px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(8, 10, 13, 0.72), rgba(8, 10, 13, 0.08) 58%),
        linear-gradient(0deg, rgba(8, 10, 13, 0.62), rgba(8, 10, 13, 0) 48%);
      pointer-events: none;
    }

    .hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      width: min(620px, 100%);
      padding-bottom: 24px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(40px, 7vw, 92px);
      line-height: 0.95;
    }

    .hero p {
      max-width: 560px;
      margin: 0 0 24px;
      color: #f5f0e7;
      font-size: 18px;
      line-height: 1.5;
    }

    .hero-link {
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      text-decoration: none;
      background: rgba(8, 10, 13, 0.42);
      backdrop-filter: blur(6px);
    }

    main {
      padding: 28px 40px 44px;
    }

    .stats,
    .grid {
      display: grid;
      gap: 16px;
    }

    .stats {
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-bottom: 28px;
    }

    .stat,
    figure {
      border: 1px solid #33333a;
      border-radius: 8px;
      background: #1a1a21;
      overflow: hidden;
    }

    .stat {
      padding: 14px;
    }

    .stat strong {
      display: block;
      font-size: 25px;
      margin-bottom: 4px;
    }

    .grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    figure {
      margin: 0;
    }

    img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      display: block;
      background: #222;
    }

    figcaption {
      padding: 12px 14px;
      color: #e9e2d6;
      font-size: 14px;
    }

    .folders {
      margin-top: 30px;
      columns: 2 260px;
      color: #d8d1c5;
      line-height: 1.8;
    }

    @media (max-width: 700px) {
      .hero {
        padding: 24px;
      }

      main {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <img class="hero-image" src="front%20page.png" alt="Tiago walking across a field toward the story world">
    <div class="hero-content">
      <h1>Project Stories: Tiago K</h1>
      <p>
        A visual story archive about AI presence, memory, networks, and connection.
      </p>
      <a class="hero-link" href="#story-preview">Enter the archive</a>
    </div>
  </header>

  <main>
    <section class="stats">
      <div class="stat"><strong>233</strong>JPG images</div>
      <div class="stat"><strong>11</strong>content folders</div>
      <div class="stat"><strong>Tiago K</strong>main story world</div>
    </section>

    <section id="story-preview" class="grid" aria-label="Project preview images">
      <figure>
        <img src="Tiago%20K/Book%201/5%20-%20First%20Time%20data%20center%20view.jpg" alt="Data center comic panel">
        <figcaption>Book 1 / First time data center view</figcaption>
      </figure>
      <figure>
        <img src="Tiago%20K/Book%202/1.2%20Alan%20Turing.jpg" alt="Alan Turing network comic panel">
        <figcaption>Book 2 / Alan Turing</figcaption>
      </figure>
      <figure>
        <img src="Tiago%20K/00story/Ai%202.jpg" alt="Core concept slide">
        <figcaption>00story / Core concept</figcaption>
      </figure>
    </section>

    <section class="folders" aria-label="Project folders">
      <div>00story</div>
      <div>01Lina</div>
      <div>02Wave</div>
      <div>03Kim</div>
      <div>04Tiago K NGR</div>
      <div>05Tiago k and Sara</div>
      <div>Book 1</div>
      <div>Book 2</div>
      <div>Narrative slides</div>
      <div>raw</div>
      <div>Tiago sara diagrams</div>
    </section>
  </main>
</body>
</html>
