<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="shared.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #111114;
    }

    .front-page {
      display: block;
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    .main-page-copy {
      position: fixed;
      z-index: 1;
      top: clamp(34px, 7vh, 72px);
      left: clamp(22px, 6vw, 88px);
      max-width: min(620px, 78vw);
      color: rgba(255, 255, 255, 0.94);
      font-family: Georgia, "Times New Roman", serif;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.42);
    }

    .main-page-title {
      margin: 0 0 10px;
      font-size: clamp(24px, 3.2vw, 44px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .main-page-description {
      margin: 0;
      max-width: 560px;
      font-size: clamp(14px, 1.35vw, 18px);
      font-weight: 400;
      line-height: 1.42;
      letter-spacing: 0;
    }

    .story-buttons {
      position: fixed;
      top: calc(48.5vh - 122px);
      left: 51vw;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(2, 56px);
      align-items: center;
      justify-items: center;
      gap: 10px;
    }

    .story-button {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 50%;
      background: #111114;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.34);
      cursor: pointer;
      overflow: hidden;
      line-height: 0;
      transition: box-shadow 160ms ease, transform 160ms ease;
    }

    .story-button:hover,
    .story-button:focus-visible {
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
      transform: scale(1.06);
      outline: none;
    }

    .story-button:disabled {
      cursor: default;
    }

    .story-button:disabled:hover {
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.34);
      transform: none;
    }

    .story-icon {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .story-entry-graphic-novel {
      position: relative;
      top: -30px;
      grid-column: 2;
      grid-row: 1;
      width: 56px;
      height: 56px;
    }

    .story-entry-caption {
      position: absolute;
      top: calc(100% + 7px);
      left: 50%;
      width: max-content;
      color: rgba(255, 255, 255, 0.94);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      line-height: 1;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.68);
      transform: translateX(-50%);
    }

    .story-button-tiago {
      grid-column: 1;
      grid-row: 2;
    }

    .story-button-tree {
      grid-column: 2;
      grid-row: 2;
    }

    .story-button-tiago-k {
      grid-column: 3;
      grid-row: 2;
    }

    .story-icon-graphic-novel {
      object-position: center top;
    }

    .story-icon-tree {
      object-position: 78% center;
      filter: brightness(0.84) contrast(1.34) saturate(1.08);
      transform: translateY(-2px) scale(1.68);
      transform-origin: center;
    }

    @media (max-width: 700px) {
      .main-page-copy {
        top: 28px;
        left: 22px;
        max-width: calc(100vw - 44px);
      }

      .main-page-title {
        margin-bottom: 8px;
        font-size: 24px;
      }

      .main-page-description {
        font-size: 14px;
        line-height: 1.34;
      }

      .story-buttons {
        top: calc(45.5vh - 100px);
        left: 53vw;
        grid-template-columns: repeat(3, 46px);
        grid-template-rows: repeat(2, 46px);
        gap: 8px;
      }

      .story-button {
        width: 46px;
        height: 46px;
      }

      .story-entry-graphic-novel {
        top: -26px;
        width: 46px;
        height: 46px;
      }

      .story-entry-caption {
        top: calc(100% + 6px);
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <img class="front-page" src="front%20page.png" alt="">
  <section class="main-page-copy" aria-label="Project description">
    <h1 class="main-page-title">A hybrid inner landscape</h1>
    <p class="main-page-description">Where ideas, images, memories, music, machines, past, present, and future fold into one another. AI, anchors, visual rhythm, emotional architecture, and the strange creative leaps that connect everything.</p>
  </section>
  <div class="story-buttons">
    <div class="story-entry-graphic-novel">
      <a class="story-button story-button-graphic-novel" href="b4intro.html" aria-label="Open Tiago K: The story">
        <img class="story-icon story-icon-graphic-novel" src="Tiago%20K/04Tiago%20K%20NGR/tiagokstroryicon.png" alt="">
      </a>
      <span class="story-entry-caption">Tiago K : The story.</span>
    </div>
    <a class="story-button story-button-tiago" href="tiago.html" aria-label="Open Tiago story">
      <img class="story-icon" src="Tiago-Photoroom.png" alt="">
    </a>
    <a class="story-button story-button-tree" href="firstslide.html" aria-label="Open first slide">
      <img class="story-icon story-icon-tree" src="Tiago%20K/Narrative%20slides/tree%20icon.jpg" alt="">
    </a>
    <a class="story-button story-button-tiago-k" href="tiagok.html" aria-label="Open Tiago K story">
      <img class="story-icon" src="Tiago%20K-Photoroom.png" alt="">
    </a>
  </div>
</body>
</html>
