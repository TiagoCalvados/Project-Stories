<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #111114;
    }

    .front-page {
      display: block;
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    .story-buttons {
      position: fixed;
      top: 47vh;
      left: 58vw;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .story-button {
      display: grid;
      flex: 0 0 72px;
      place-items: center;
      width: 72px;
      height: 72px;
      border: 3px solid rgba(255, 255, 255, 0.78);
      border-radius: 50%;
      background: #111114;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
      cursor: pointer;
      overflow: hidden;
      line-height: 0;
      transition: box-shadow 160ms ease, transform 160ms ease;
    }

    .story-button:hover,
    .story-button:focus-visible {
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.42);
      transform: scale(1.06);
      outline: none;
    }

    .story-icon {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 700px) {
      .story-buttons {
        top: 44vh;
        left: 61vw;
        gap: 9px;
      }

      .story-button {
        flex-basis: 58px;
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <img class="front-page" src="front%20page.png" alt="">
  <div class="story-buttons">
    <a class="story-button" href="Tiago%20K/00story/Ai%202.jpg" aria-label="Open Tiago story">
      <img class="story-icon" src="Tiago-Photoroom.png" alt="">
    </a>
    <a class="story-button" href="Tiago%20K/Book%202/1.2%20Alan%20Turing.jpg" aria-label="Open Tiago K story">
      <img class="story-icon" src="Tiago%20K-Photoroom.png" alt="">
    </a>
  </div>
</body>
</html>
