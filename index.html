<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #111114;
    }

    .front-page {
      display: block;
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    .tiago-icon {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 96px;
      height: 96px;
      border: 3px solid rgba(255, 255, 255, 0.78);
      border-radius: 50%;
      background: #111114;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
      object-fit: cover;
    }

    @media (max-width: 700px) {
      .tiago-icon {
        top: 16px;
        left: 16px;
        width: 76px;
        height: 76px;
      }
    }
  </style>
</head>
<body>
  <img class="front-page" src="front%20page.png" alt="">
  <img class="tiago-icon" src="Tiago-Photoroom.png" alt="">
</body>
</html>
