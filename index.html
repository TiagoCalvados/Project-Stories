<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #111114;
    }

    .front-page {
      display: block;
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    .story-buttons {
      position: fixed;
      top: calc(48.5vh - 56px);
      left: 51vw;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .story-button {
      display: grid;
      flex: 0 0 56px;
      place-items: center;
      width: 56px;
      height: 56px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 50%;
      background: #111114;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.34);
      cursor: pointer;
      overflow: hidden;
      line-height: 0;
      transition: box-shadow 160ms ease, transform 160ms ease;
    }

    .story-button:hover,
    .story-button:focus-visible {
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
      transform: scale(1.06);
      outline: none;
    }

    .story-icon {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .story-button-static {
      cursor: default;
    }

    @media (max-width: 700px) {
      .story-buttons {
        top: calc(45.5vh - 46px);
        left: 53vw;
        gap: 8px;
      }

      .story-button {
        flex-basis: 46px;
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <img class="front-page" src="front%20page.png" alt="">
  <div class="story-buttons">
    <a class="story-button" href="tiago.html" aria-label="Open Tiago story">
      <img class="story-icon" src="Tiago-Photoroom.png" alt="">
    </a>
    <span class="story-button story-button-static" role="img" aria-label="Tree icon">
      <img class="story-icon" src="Tiago%20K/Narrative%20slides/tree%20icon.jpg" alt="">
    </span>
    <a class="story-button" href="tiagok.html" aria-label="Open Tiago K story">
      <img class="story-icon" src="Tiago%20K-Photoroom.png" alt="">
    </a>
  </div>
</body>
</html>
