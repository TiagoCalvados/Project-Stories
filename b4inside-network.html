<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="shared.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #08080a;
    }

    .enter-button-b4-inside-network {
      position: absolute;
      top: 24px;
      right: 24px;
      bottom: auto;
      left: auto;
      cursor: default;
      transform: none;
    }

    .enter-button-b4-inside-network:hover,
    .enter-button-b4-inside-network:focus-visible,
    .enter-button-b4-inside-network:active {
      background: rgba(8, 8, 10, 0.62);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.38);
      transform: none;
    }

    @media (max-width: 700px) {
      .enter-button-b4-inside-network {
        top: 16px;
        right: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="story-stage">
    <div class="story-frame">
      <img class="story-stage-image" src="Tiago%20K/Book%202/1.%20Inside%20de%20network.jpg" alt="">
      <button class="enter-button enter-button-b4-standard enter-button-b4-inside-network" type="button" aria-label="Continue B4 Inside the Network" disabled>Enter</button>
    </div>
  </main>
</body>
</html>
